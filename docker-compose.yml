services:
  ai-service:
    build:
      context: ./ai-service
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MAX_CV_CHARS: ${MAX_CV_CHARS:-20000}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  gateway:
    build:
      context: ./gateway
    environment:
      PORT: 8080
      ENVIRONMENT: ${ENVIRONMENT:-development}
      AI_SERVICE_URL: http://ai-service:8000
      SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-20}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-5}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-60}
    ports:
      - "8080:8080"
    depends_on:
      ai-service:
        condition: service_healthy
    healthcheck:
      # GET (not --spider/HEAD): the gateway only registers GET on /health.
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_GATEWAY_URL: ${NEXT_PUBLIC_GATEWAY_URL:-http://localhost:8080}
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      gateway:
        condition: service_healthy
