name: keep-warm

# Render's free tier spins a service down after ~15 min of inactivity, so the
# first request after idle eats a cold start (~20-50s) and can fail with a 502.
# This pings both services' /health endpoints periodically to keep them awake.

on:
  schedule:
    # Every 10 minutes. Note: GitHub may delay scheduled runs under load, so the
    # effective interval can stretch — that's fine, it just needs to land inside
    # Render's ~15 min idle window most of the time.
    - cron: "*/10 * * * *"
  workflow_dispatch: {} # allows manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoints
        run: |
          for url in \
            "https://papyrus-gateway.onrender.com/health" \
            "https://papyrus-94mv.onrender.com/health"; do
            echo "Pinging $url"
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "$url" || echo "000")
            echo "  -> $code"
          done
